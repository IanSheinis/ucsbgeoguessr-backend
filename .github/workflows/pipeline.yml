# https://docs.github.com/en/actions/how-tos/secure-your-work/security-harden-deployments/oidc-in-aws
name: CI/CD pipeline
on:
  push: 
    branches: [ "master" ]
  pull_request: # all branches

# permission can be added at job level or workflow level
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  # Run npm test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0 # got from node -v
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
      
  # Deploy images and backend if there is a push to master
  # TODO: Instead of cdk bucketdeployment, use aws s3 sync 
  deploy_backend:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'
    # Concurrency incase there's multiple pushes to master
    concurrency: 
      group: deploy-backend-${{ github.ref }}
      cancel-in-progress: false # False means a job queues, True means canceling the in-progress job which is what we don't want
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Use OpenID Connect to connect to GITHUB
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE }}
          role-session-name: ucsbgeoguessr-github-actions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never #--require-approval never so there's no y/n question
        env:
          ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          ENVIRONMENT: ${{ secrets.AWS_ENVIRONMENT }}
          REGION: ${{ secrets.AWS_REGION }}